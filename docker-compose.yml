services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: on-failure

  excalidraw:
    build:
      context: .
    environment:
      BACKEND_HOST: backend:3002
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: on-failure
