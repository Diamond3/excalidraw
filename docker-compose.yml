services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: excalidraw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./self-hosted-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/excalidraw
      PORT: "3002"
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  excalidraw:
    build:
      context: .
      args:
        - NODE_ENV=production
        - VITE_APP_API_URL=http://localhost:3002
        - VITE_APP_BACKEND_V2_GET_URL=http://localhost:3002/api/v2/
        - VITE_APP_BACKEND_V2_POST_URL=http://localhost:3002/api/v2/post/
        - VITE_APP_WS_SERVER_URL=http://localhost:3002
        - VITE_APP_FIREBASE_CONFIG={}
    container_name: excalidraw
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: on-failure

volumes:
  pgdata:
